<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyfdoS — Think Bigger Than the Universe.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
:root {
  --black:     #0a0a0a;
  --white:     #ffffff;
  --gray-100:  #f5f5f5;
  --gray-200:  #e5e5e5;
  --gray-400:  #999;
  --gray-600:  #555;
  --font-serif: 'EB Garamond', Georgia, serif;
  --font-sans:  'Inter', system-ui, sans-serif;
  --font-mono:  'JetBrains Mono', monospace;
}
body {
  font-family: var(--font-sans);
  background: #f5f4f0;
  color: var(--black);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  height: 100vh;
}

/* ── NAV ──────────────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 48px;
  display: flex; align-items: center;
  padding: 0 2rem;
  background: transparent;
}
.nav-brand {
  font-family: var(--font-mono);
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.04em;
  text-decoration: none; color: rgba(0,0,0,0.35);
  transition: color .2s;
}
.nav-brand:hover { color: rgba(0,0,0,0.7); }
.nav-links-right { display: none; }

/* ── GALAXY SECTION ──────────────────────────────────────────── */
#galaxy {
  position: relative;
  width: 100%; height: 100vh;
  overflow: hidden;
  background: #f5f4f0;
}
#solarCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
  cursor: grab;
  touch-action: none;
}



/* ── PLANET LABELS ────────────────────────────────────────────── */
.planet-label {
  position: absolute;
  transform: translate(-50%, -150%);
  z-index: 50;
  cursor: pointer;
  pointer-events: auto;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity .2s;
  padding: 0.4rem 0.2rem;  /* larger touch target */
}
.planet-label:hover { opacity: 0.6; }
.planet-label .pl-name {
  font-family: var(--font-mono);
  font-size: 0.62rem; font-weight: 400;
  color: rgba(0,0,10,0.4); text-align: center; letter-spacing: 0.07em;
}
@media (max-width: 600px) {
  .planet-label .pl-name { font-size: 0.7rem; letter-spacing: 0.05em; }
}

/* ── SUN LABEL ────────────────────────────────────────────────── */
#sunLabel {
  position: absolute; z-index: 50;
  transform: translate(-50%, -240%);
  text-align: center; pointer-events: none;
}
.sun-name {
  font-family: var(--font-serif);
  font-size: 0.95rem; font-style: italic;
  letter-spacing: 0.01em;
  color: rgba(160,100,10,0.65);
}


/* ── CREATOR ──────────────────────────────────────────────────── */
#creator {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 200;
  text-decoration: none;
  display: flex; align-items: center; gap: 0.7rem;
  padding: 0.65rem 1rem;
  background: rgba(245,244,240,0.82);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 2px;
  transition: border-color .2s, background .2s;
}
#creator:hover {
  background: rgba(245,244,240,0.97);
  border-color: rgba(0,0,0,0.18);
}
#creator img {
  width: 28px; height: 28px;
  opacity: 0.75;
}
.creator-name {
  font-family: var(--font-mono);
  font-size: 0.72rem; font-weight: 500;
  color: rgba(0,0,0,0.65); letter-spacing: 0.03em;
  display: block;
}
.creator-role {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: rgba(0,0,0,0.32); letter-spacing: 0.05em;
  display: block;
}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 700px) {
  nav { padding: 0 1.2rem; }
  #sunLabel { transform: translate(-50%, -260%); }
  #creator { bottom: 1.2rem; right: 1.2rem; padding: 0.5rem 0.75rem; }
  #creator img { width: 22px; height: 22px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-brand" href="/">Polyfd<span>o</span>S</a>
  <div class="nav-links-right"></div>
</nav>

<!-- CREATOR -->
<a id="creator" href="/polyfdor">
  <img src="/static/img/crow.svg" alt="PolyfdoR">
  <div>
    <span class="creator-name">PolyfdoR</span>
    <span class="creator-role">Creator of the universe</span>
  </div>
</a>

<!-- GALAXY -->
<section id="galaxy">
  <canvas id="solarCanvas"></canvas>

  <!-- Sun label -->
  <div id="sunLabel">
    <div class="sun-name">PolyfdoS</div>
  </div>

  <!-- Planet labels -->
  <a class="planet-label" href="/polyfdos" id="lbl-polyfdos-os">
    <div class="pl-name">polyfdOS</div>
  </a>
  <a class="planet-label" href="/matyos" id="lbl-matyos">
    <div class="pl-name">MatyOS</div>
  </a>
  <a class="planet-label" href="/cookixdb" id="lbl-cookixdb">
    <div class="pl-name">CookixDB</div>
  </a>
  <a class="planet-label" href="/bring" id="lbl-bring">
    <div class="pl-name">Bring</div>
  </a>
  <a class="planet-label" href="/polyfdor" id="lbl-research">
    <div class="pl-name">Research</div>
  </a>
</section>


<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   POLYFDOS SOLAR SYSTEM — Three.js
   PolyfdoS = the Sun (center of everything)
   Each project = a planet with custom GLSL shader
   ═══════════════════════════════════════════════════════ */

const galaxy  = document.getElementById('galaxy');
const canvas  = document.getElementById('solarCanvas');
const W = () => canvas.clientWidth;
const H = () => canvas.clientHeight;

// ── Renderer ─────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0xf5f4f0, 1);

// ── Scene + Camera ────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, W()/H(), 0.1, 600);
// View from above at a slight angle — shows orbits clearly
camera.position.set(0, 22, 26);
camera.lookAt(0, 0, 0);

// ── Fog ───────────────────────────────────────────────────────
scene.fog = new THREE.FogExp2(0xf5f4f0, 0.006);

// ── Lights ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x9999bb, 1.4));
const sunLight = new THREE.PointLight(0xfff0cc, 4.0, 80, 1.5);
scene.add(sunLight);
const rimLight = new THREE.DirectionalLight(0x8899bb, 0.5);
rimLight.position.set(-10, 15, -10); scene.add(rimLight);

// ── SHARED PLANET SHADERS ─────────────────────────────────────
const PLANET_VS = `
  varying vec3 vNormal;
  varying vec3 vViewPos;
  varying vec2 vUv;
  void main() {
    vNormal   = normalize(normalMatrix * normal);
    vec4 mvp  = modelViewMatrix * vec4(position, 1.0);
    vViewPos  = mvp.xyz;
    vUv       = uv;
    gl_Position = projectionMatrix * mvp;
  }`;

const PLANET_FS = `
  precision highp float;
  uniform vec3  uColor;
  uniform vec3  uAtmo;
  uniform float uTime;
  uniform float uSeed;
  varying vec3  vNormal;
  varying vec3  vViewPos;
  varying vec2  vUv;

  // Gradient noise
  vec2 hash2(vec2 p) {
    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
    return -1.0 + 2.0*fract(sin(p)*43758.5453);
  }
  float gnoise(vec2 p) {
    vec2 i=floor(p), f=fract(p);
    vec2 u=f*f*(3.0-2.0*f);
    return mix(mix(dot(hash2(i),f-vec2(0,0)),dot(hash2(i+vec2(1,0)),f-vec2(1,0)),u.x),
               mix(dot(hash2(i+vec2(0,1)),f-vec2(0,1)),dot(hash2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);
  }
  float fbm(vec2 p) {
    float v=0.0, a=0.55;
    mat2 rot=mat2(0.8660, 0.5000, -0.5000, 0.8660);
    for(int i=0;i<5;i++){ v+=a*gnoise(p); p=rot*p*2.07; a*=0.48; }
    return v;
  }

  void main() {
    // Animated UV
    vec2 uv = vUv * 3.0 + vec2(uTime * 0.007, uSeed * 0.5);
    float n1 = fbm(uv + uSeed);
    float n2 = fbm(uv * 2.1 + vec2(1.73 + uSeed, 0.91));
    float surface = clamp(n1*0.65 + n2*0.35 + 0.45, 0.0, 1.0);

    // Surface color bands
    vec3 dark   = uColor * 0.35;
    vec3 mid    = uColor;
    vec3 bright = min(uColor * 1.7 + 0.1, vec3(1.0));
    vec3 surfColor;
    if(surface < 0.4)      surfColor = mix(dark, mid,    surface/0.4);
    else                   surfColor = mix(mid,  bright, (surface-0.4)/0.6);

    // Diffuse (light from sun = origin; approximate in view space)
    vec3 lightV = normalize(-vViewPos);  // toward camera = crude sun approx
    float diff = max(dot(vNormal, normalize(vec3(0.8,0.5,1.0))), 0.0);
    float ambi = 0.12;

    // Fresnel atmospheric rim
    vec3 viewDir = normalize(-vViewPos);
    float fres = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 4.0);
    vec3  atmo  = uAtmo * fres * 1.4;

    // Specular
    vec3  h     = normalize(normalize(vec3(0.8,0.5,1.0)) + viewDir);
    float spec  = pow(max(dot(vNormal, h), 0.0), 20.0) * 0.25;

    vec3 color = surfColor*(ambi + diff*0.88) + atmo + vec3(spec);
    gl_FragColor = vec4(color, 1.0);
  }`;

// ── SUN SHADERS ───────────────────────────────────────────────
const SUN_VS = PLANET_VS;
const SUN_FS = `
  precision highp float;
  uniform float uTime;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  varying vec2 vUv;

  vec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.0+2.0*fract(sin(p)*43758.5453);}
  float gnoise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);return mix(mix(dot(hash2(i),f),dot(hash2(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(hash2(i+vec2(0,1)),f-vec2(0,1)),dot(hash2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);}
  float fbm(vec2 p){float v=0.0,a=0.55;mat2 r=mat2(0.866,0.5,-0.5,0.866);for(int i=0;i<6;i++){v+=a*gnoise(p);p=r*p*2.1;a*=0.47;}return v;}

  void main() {
    vec2 uv = vUv * 2.5 + vec2(uTime*0.018, uTime*0.009);
    float n  = fbm(uv);
    float n2 = fbm(uv * 2.2 + 3.1);
    float s  = clamp(n*0.6 + n2*0.4 + 0.5, 0.0, 1.0);

    vec3 col1 = vec3(1.0, 0.38, 0.04); // deep orange
    vec3 col2 = vec3(1.0, 0.82, 0.30); // warm gold
    vec3 col3 = vec3(1.0, 0.97, 0.78); // hot white
    vec3 sun  = s < 0.5 ? mix(col1,col2,s*2.0) : mix(col2,col3,(s-0.5)*2.0);

    // Corona rim
    vec3  vd   = normalize(-vViewPos);
    float fres = pow(1.0 - dot(vNormal, vd), 2.2);
    sun += vec3(1.0, 0.55, 0.08) * fres * 2.0;

    gl_FragColor = vec4(sun, 1.0);
  }`;

// ── CORONA GLOW SHADER ────────────────────────────────────────
const CORONA_FS = `
  precision highp float;
  uniform float uTime;
  void main() {
    vec2  uv   = gl_PointCoord - 0.5;
    float r    = length(uv);
    if(r > 0.5) discard;
    float glow = smoothstep(0.5, 0.0, r);
    float pulse= 0.85 + 0.15*sin(uTime*1.4);
    vec3  col  = mix(vec3(1.0,0.55,0.05), vec3(1.0,0.92,0.4), 1.0-r*2.0) * pulse;
    gl_FragColor = vec4(col, glow * 0.55);
  }`;

const CORONA_VS = `
  uniform float uSize;
  void main() {
    gl_PointSize = uSize;
    gl_Position  = projectionMatrix * modelViewMatrix * vec4(position,1.0);
  }`;

// ── STAR FIELD ────────────────────────────────────────────────
(function buildStars() {
  const N = 5000;
  const pos = new Float32Array(N * 3);
  const siz = new Float32Array(N);
  const bri = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    const r = 60 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    siz[i] = 0.5 + Math.random() * 1.8;
    bri[i] = 0.5 + Math.random() * 0.5;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',  new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aSize',     new THREE.BufferAttribute(siz, 1));
  geo.setAttribute('aBrightness', new THREE.BufferAttribute(bri, 1));
  const mat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float aSize; attribute float aBrightness;
      varying float vB;
      void main(){ vB=aBrightness; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=aSize*(300.0/(-mv.z)); gl_Position=projectionMatrix*mv; }`,
    fragmentShader: `
      varying float vB;
      void main(){ vec2 uv=gl_PointCoord-0.5; float r=length(uv); if(r>.5)discard; float a=smoothstep(.5,.0,r)*vB*0.55; gl_FragColor=vec4(vec3(0.08,0.08,0.14), a); }`,
    transparent: true, depthWrite: false
  });
  scene.add(new THREE.Points(geo, mat));
})();

// ── BUILD SUN ────────────────────────────────────────────────
const sunUniforms = { uTime: { value: 0 } };
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(2.0, 64, 64),
  new THREE.ShaderMaterial({ vertexShader: SUN_VS, fragmentShader: SUN_FS, uniforms: sunUniforms })
);
scene.add(sun);

// Sun glow corona sprite
const coronaUniforms = { uTime: { value: 0 }, uSize: { value: 300 } };
const coronaGeo = new THREE.BufferGeometry();
coronaGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0]), 3));
const corona = new THREE.Points(coronaGeo, new THREE.ShaderMaterial({
  vertexShader: CORONA_VS, fragmentShader: CORONA_FS,
  uniforms: coronaUniforms, transparent: true, depthWrite: false
}));
scene.add(corona);

// ── PLANET CONFIGS ────────────────────────────────────────────
const CONFIGS = [
  {
    id:      'polyfdos-os',
    radius:  0.62,  orbitR: 5.2,   speed: 0.00044, angle0: 0.6,  incline: 0.07,
    color:   new THREE.Color(0x0d0d0d), atmo: new THREE.Color(0xc8c8c8), seed: 1.1,
    rings: false, moon: false, labelEl: 'lbl-polyfdos-os'
  },
  {
    id:      'matyos',
    radius:  0.50,  orbitR: 7.8,   speed: 0.00028, angle0: 2.2,  incline: 0.12,
    color:   new THREE.Color(0x0d0d0d), atmo: new THREE.Color(0xc8c8c8), seed: 2.7,
    rings: false, moon: false, labelEl: 'lbl-matyos'
  },
  {
    id:      'cookixdb',
    radius:  0.78,  orbitR: 10.8,  speed: 0.00018, angle0: 4.0,  incline: 0.04,
    color:   new THREE.Color(0x0d0d0d), atmo: new THREE.Color(0xc8c8c8), seed: 4.3,
    rings: false, moon: true,  labelEl: 'lbl-cookixdb'
  },
  {
    id:      'bring',
    radius:  0.44,  orbitR: 13.2,  speed: 0.00012, angle0: 1.0,  incline: 0.15,
    color:   new THREE.Color(0x0d0d0d), atmo: new THREE.Color(0xc8c8c8), seed: 6.1,
    rings: false, moon: false, labelEl: 'lbl-bring'
  },
  {
    id:      'research',
    radius:  0.70,  orbitR: 16.5,  speed: 0.00007, angle0: 3.2,  incline: 0.08,
    color:   new THREE.Color(0x0d0d0d), atmo: new THREE.Color(0xc8c8c8), seed: 8.8,
    rings: false, moon: false, labelEl: 'lbl-research'
  },
];

// ── BUILD PLANETS ─────────────────────────────────────────────
const planets = [];
const ORBIT_MAT = new THREE.MeshBasicMaterial({
  color: 0x111122, transparent: true, opacity: 0.18, side: THREE.DoubleSide
});

CONFIGS.forEach(cfg => {
  // Orbit ring
  const orbitGeo = new THREE.TorusGeometry(cfg.orbitR, 0.025, 2, 220);
  const orbit = new THREE.Mesh(orbitGeo, ORBIT_MAT);
  orbit.rotation.x = Math.PI / 2 + cfg.incline;
  scene.add(orbit);

  // Planet uniforms
  const uniforms = {
    uColor: { value: cfg.color },
    uAtmo:  { value: cfg.atmo },
    uTime:  { value: 0 },
    uSeed:  { value: cfg.seed }
  };

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(cfg.radius, 48, 48),
    new THREE.ShaderMaterial({
      vertexShader: PLANET_VS, fragmentShader: PLANET_FS,
      uniforms
    })
  );
  scene.add(mesh);

  // Atmosphere glow shell
  const atmoMesh = new THREE.Mesh(
    new THREE.SphereGeometry(cfg.radius * 1.35, 32, 32),
    new THREE.MeshBasicMaterial({
      color: cfg.atmo, transparent: true,
      opacity: 0.22, side: THREE.BackSide
    })
  );
  scene.add(atmoMesh);

  // Saturn-style rings (Research planet)
  const ringMeshes = [];
  if (cfg.rings) {
    [1.5, 1.85, 2.2].forEach((rm, ri) => {
      const rg = new THREE.TorusGeometry(cfg.radius * rm, cfg.radius * 0.10, 2, 128);
      const rmMesh = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({
        color: cfg.atmo, transparent: true, opacity: [0.25, 0.15, 0.10][ri], side: THREE.DoubleSide
      }));
      scene.add(rmMesh);
      ringMeshes.push(rmMesh);
    });
  }

  // Moon (CookixDB)
  let moon = null;
  if (cfg.moon) {
    moon = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 })
    );
    scene.add(moon);
  }

  planets.push({ cfg, mesh, atmoMesh, uniforms, ringMeshes, moon, angle: cfg.angle0 });
});

// ── LABEL & SUN LABEL REFS ────────────────────────────────────
const sunLabelEl = document.getElementById('sunLabel');
const labelEls   = {};
planets.forEach(p => { labelEls[p.cfg.id] = document.getElementById(p.cfg.labelEl); });

// Project 3D position → galaxy-section pixel coords
function toScreenPos(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * W(),
    y: (-v.y * 0.5 + 0.5) * H(),
    z: v.z
  };
}

// ── INTERACTIVE CAMERA ────────────────────────────────────────
function responsiveRadius() {
  const w = W();
  if (w < 480) return 46;
  if (w < 768) return 36;
  return 28;
}

let camTheta  = 0.5;
let camPhi    = 0.60;
let camRadius = responsiveRadius();
let isDragging   = false;
let dragStartPos = null;
let dragMoved    = false;

function navigate(id) {
  if (id === 'polyfdos-os') window.location.href = '/polyfdos';
  else if (id === 'research') window.location.href = '/polyfdor';
  else window.location.href = '/' + id.replace('-', '');
}

// ── Raycaster ─────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
function raycastPlanet(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  mouse.x =  ((cx - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((cy - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = planets.map(p => p.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length) {
    const idx = meshes.indexOf(hits[0].object);
    if (idx !== -1) navigate(CONFIGS[idx].id);
  }
}

// ── Mouse drag ────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isDragging = true; dragMoved = false;
  dragStartPos = { x: e.clientX, y: e.clientY };
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
});
window.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - dragStartPos.x;
    const dy = e.clientY - dragStartPos.y;
    if (Math.abs(dx) + Math.abs(dy) > 4) dragMoved = true;
    camTheta -= dx * 0.006;
    camPhi = Math.max(0.08, Math.min(1.45, camPhi - dy * 0.004));
    dragStartPos = { x: e.clientX, y: e.clientY };
  } else {
    const rect = canvas.getBoundingClientRect();
    mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(planets.map(p => p.mesh));
    canvas.style.cursor = hits.length ? 'pointer' : 'grab';
  }
});
canvas.addEventListener('click', e => {
  if (!dragMoved) raycastPlanet(e.clientX, e.clientY);
});

// ── Scroll to zoom ────────────────────────────────────────────
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camRadius = Math.max(8, Math.min(60, camRadius + e.deltaY * 0.05));
}, { passive: false });

// ── Touch drag + pinch ────────────────────────────────────────
let prevTouch = null, prevPinchDist = null;
canvas.addEventListener('touchstart', e => {
  dragMoved = false;
  if (e.touches.length === 1) {
    prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    dragStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    prevPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && prevTouch) {
    const dx = e.touches[0].clientX - prevTouch.x;
    const dy = e.touches[0].clientY - prevTouch.y;
    if (Math.abs(dx) + Math.abs(dy) > 8) dragMoved = true;
    camTheta -= dx * 0.007;
    camPhi = Math.max(0.08, Math.min(1.45, camPhi - dy * 0.005));
    prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2 && prevPinchDist !== null) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    camRadius = Math.max(8, Math.min(60, camRadius * (prevPinchDist / dist)));
    prevPinchDist = dist;
    dragMoved = true;
  }
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!dragMoved && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    raycastPlanet(t.clientX, t.clientY);
  }
  prevTouch = null; prevPinchDist = null;
}, { passive: true });

// ── RESIZE ────────────────────────────────────────────────────
new ResizeObserver(() => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  coronaUniforms.uSize.value = Math.min(W(), H()) * 0.28;
}).observe(canvas);
coronaUniforms.uSize.value = Math.min(W(), H()) * 0.28;

// ── ANIMATION LOOP ────────────────────────────────────────────
let t = 0;
const moonOffset = new THREE.Vector3();
(function loop() {
  requestAnimationFrame(loop);
  t += 0.01;

  // Update sun shaders
  sunUniforms.uTime.value   = t;
  coronaUniforms.uTime.value = t;

  // Auto-drift when idle; user can override by dragging
  if (!isDragging) camTheta += 0.0004;
  camera.position.set(
    camRadius * Math.cos(camPhi) * Math.sin(camTheta),
    camRadius * Math.sin(camPhi),
    camRadius * Math.cos(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);

  // Update planets
  planets.forEach(p => {
    p.angle += p.cfg.speed;
    const inc = p.cfg.incline;
    const r   = p.cfg.orbitR;
    const x   = r * Math.cos(p.angle);
    const z   = r * Math.sin(p.angle);
    const y   = Math.sin(p.angle) * r * Math.sin(inc);

    p.mesh.position.set(x, y, z);
    p.atmoMesh.position.set(x, y, z);

    // Planet self-rotation
    p.mesh.rotation.y += 0.004;

    // Rings follow planet, tilt fixed
    p.ringMeshes.forEach((rm, ri) => {
      rm.position.set(x, y, z);
      rm.rotation.x = Math.PI / 2 + 0.3;
      rm.rotation.z = t * 0.001;
    });

    // Moon (CookixDB)
    if (p.moon) {
      const ma = t * 0.8;
      p.moon.position.set(
        x + Math.cos(ma) * (p.cfg.radius * 2.0),
        y + Math.sin(ma) * (p.cfg.radius * 0.3),
        z + Math.sin(ma) * (p.cfg.radius * 2.0)
      );
    }

    p.atmoMesh.material.opacity = 0.22;

    // Update planet shader time
    p.uniforms.uTime.value = t;

    // Label positioning
    const screenPos = toScreenPos(p.mesh.position.clone());
    const lbl = labelEls[p.cfg.id];
    if (lbl) {
      if (screenPos.z < 1.0) {
        lbl.style.display = 'block';
        lbl.style.left = screenPos.x + 'px';
        lbl.style.top  = (screenPos.y - p.cfg.radius * 55) + 'px';
      } else {
        lbl.style.display = 'none';
      }
    }
  });

  // Sun label
  const sunScreen = toScreenPos(new THREE.Vector3(0, 2.2, 0));
  sunLabelEl.style.left = sunScreen.x + 'px';
  sunLabelEl.style.top  = sunScreen.y + 'px';

  renderer.render(scene, camera);
})();
</script>
