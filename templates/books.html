<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — PolyfdoS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050505;
  font-family: 'JetBrains Mono', monospace;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ──────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 48px;
  display: flex; align-items: center; gap: 1.4rem;
  padding: 0 1.8rem;
  background: rgba(5,5,5,0.70);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.nav-back {
  font-size: 0.70rem; letter-spacing: 0.05em;
  color: rgba(255,255,255,0.32);
  text-decoration: none;
  transition: color .2s;
}
.nav-back:hover { color: rgba(255,255,255,0.78); }
.nav-title {
  font-size: 0.70rem; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.14);
}

/* ── CANVAS ───────────────────────────────────────── */
#libCanvas {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  display: block;
  cursor: default;
  touch-action: none;
}

/* ── TOOLTIP ──────────────────────────────────────── */
#book-tooltip {
  position: fixed;
  bottom: 2rem; left: 2rem;
  z-index: 200;
  padding: 0.65rem 1rem;
  background: rgba(10,10,10,0.82);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  display: none;
  flex-direction: column; gap: 0.2rem;
  pointer-events: none;
  max-width: 280px;
}
#tooltip-title {
  font-size: 0.68rem; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.85);
  line-height: 1.4;
}
#tooltip-action {
  font-size: 0.58rem; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.32);
}

/* ── HINT ─────────────────────────────────────────── */
#hint {
  position: fixed;
  bottom: 2rem; right: 2rem;
  font-size: 0.58rem; letter-spacing: 0.09em;
  color: rgba(255,255,255,0.18);
  pointer-events: none;
  animation: hintFade 5s ease-out 1.5s forwards;
  opacity: 1;
}
@keyframes hintFade {
  0%   { opacity: 1; }
  60%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── MOBILE TOUCH HINT ────────────────────────────── */
@media (max-width: 700px) {
  #book-tooltip { bottom: 1.2rem; left: 1.2rem; right: 1.2rem; max-width: none; }
  #hint { display: none; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="/">← PolyfdoS</a>
  <span class="nav-title">Library</span>
</nav>

<canvas id="libCanvas"></canvas>

<div id="book-tooltip">
  <span id="tooltip-title"></span>
  <span id="tooltip-action"></span>
</div>

<div id="hint">Hover a book · Click to open</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   LIBRARY 3D — Immersive bookcase, interactive books
   B&W aesthetic, eye-level camera, mouse parallax
   ══════════════════════════════════════════════════════ */

const canvas  = document.getElementById('libCanvas');
const tooltip = document.getElementById('book-tooltip');
const ttTitle = document.getElementById('tooltip-title');
const ttAction= document.getElementById('tooltip-action');

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ── Renderer ─────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x050505, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ── Scene ────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog   = new THREE.FogExp2(0x050505, 0.10);

// ── Camera ───────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(52, W() / H(), 0.05, 40);
camera.position.set(0, 0.92, 2.9);
camera.lookAt(0, 0.92, 0);

// ── Lights ───────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.07));

const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
keyLight.position.set(1.5, 8, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far  = 18;
keyLight.shadow.camera.left = keyLight.shadow.camera.bottom = -3.5;
keyLight.shadow.camera.right= keyLight.shadow.camera.top   = 3.5;
keyLight.shadow.bias = -0.0004;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x888888, 0.28);
fillLight.position.set(-5, 2, 3);
scene.add(fillLight);

// ── Shared materials ─────────────────────────────────
const shelfMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d0d, roughness: 0.92, metalness: 0.04
});
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x080808, roughness: 0.96, metalness: 0.0
});
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x060606, roughness: 1.0, metalness: 0.0
});

// ── Floor ─────────────────────────────────────────────
const floor = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.05;
floor.receiveShadow = true;
scene.add(floor);

// ── Bookcase shell ────────────────────────────────────
// Back wall
const backW = new THREE.Mesh(new THREE.BoxGeometry(5.0, 3.2, 0.06), wallMat);
backW.position.set(0, 1.55, -0.47);
backW.receiveShadow = true;
scene.add(backW);

// Side walls (partial)
[-2.53, 2.53].forEach(x => {
  const side = new THREE.Mesh(new THREE.BoxGeometry(0.07, 3.2, 0.95), wallMat);
  side.position.set(x, 1.55, 0);
  side.receiveShadow = true;
  scene.add(side);
});

// Shelf planks: bottom, middle, top
[0.08, 1.22, 2.36].forEach(y => {
  const plank = new THREE.Mesh(new THREE.BoxGeometry(5.06, 0.10, 0.90), shelfMat);
  plank.position.set(0, y, 0);
  plank.castShadow = true;
  plank.receiveShadow = true;
  scene.add(plank);
});

// ── Spine texture factory ─────────────────────────────
function makeSpineTex(lines, bgHex, fgHex) {
  const c = document.createElement('canvas');
  c.width = 80; c.height = 400;
  const ctx = c.getContext('2d');
  ctx.fillStyle = bgHex;
  ctx.fillRect(0, 0, 80, 400);
  // Thin top/bottom edge lines
  ctx.fillStyle = fgHex === '#111' ? 'rgba(0,0,0,0.25)' : 'rgba(255,255,255,0.12)';
  ctx.fillRect(0, 0, 80, 4);
  ctx.fillRect(0, 396, 80, 4);
  // Vertical text
  ctx.save();
  ctx.translate(40, 390);
  ctx.rotate(-Math.PI / 2);
  ctx.textBaseline = 'middle';
  lines.forEach((txt, i) => {
    ctx.font = i === 0
      ? 'bold 15px "Georgia", serif'
      : '10px "Courier New", monospace';
    ctx.fillStyle = fgHex;
    ctx.globalAlpha = i === 0 ? 0.92 : 0.52;
    ctx.fillText(txt, 0, i * 17);
  });
  ctx.restore();
  return new THREE.CanvasTexture(c);
}

// ── Book definitions ──────────────────────────────────
// Row 0 (bottom shelf) — 7 books
const ROW0 = [
  { w:0.21, h:1.02, color:0x1e1e1e, label:'—' },
  { w:0.18, h:1.12, color:0x2a2a2a, label:'—' },
  { w:0.25, h:0.96, color:0x383838, label:'—' },
  // ★ MAIN BOOK — center
  { w:0.29, h:1.10, color:0xe0e0e0, real:true,
    label:'The Mind and the Machine', author:'Hafdi',
    url:'/books/mind-and-the-machine' },
  { w:0.22, h:1.04, color:0x2e2e2e, label:'—' },
  { w:0.19, h:1.08, color:0x1a1a1a, label:'—' },
  { w:0.23, h:0.98, color:0x323232, label:'—' },
];

// Row 1 (middle shelf) — 7 books (all placeholders)
const ROW1 = [
  { w:0.20, h:0.94, color:0x151515, label:'—' },
  { w:0.24, h:1.06, color:0x242424, label:'—' },
  { w:0.18, h:0.98, color:0x1c1c1c, label:'—' },
  { w:0.22, h:1.00, color:0x2c2c2c, label:'—' },
  { w:0.26, h:0.92, color:0x181818, label:'—' },
  { w:0.20, h:1.04, color:0x222222, label:'—' },
  { w:0.19, h:0.96, color:0x141414, label:'—' },
];

// Build a row of books and return mesh objects
function buildRow(defs, shelfY) {
  const GAP   = 0.038;
  const DEPTH = 0.65;
  const totalW = defs.reduce((s, d) => s + d.w + GAP, 0) - GAP;
  let cursor = -totalW / 2;
  const meshes = [];

  defs.forEach(def => {
    const cx = cursor + def.w / 2;
    cursor += def.w + GAP;

    // Material(s)
    let mat;
    if (def.real) {
      const spineTex = makeSpineTex(
        [def.label, def.author || ''], '#e0e0e0', '#111'
      );
      const cover = new THREE.MeshStandardMaterial({
        color: def.color, roughness: 0.55, metalness: 0.03
      });
      const spine = new THREE.MeshStandardMaterial({
        map: spineTex, roughness: 0.60, metalness: 0.02
      });
      const top   = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.45 });
      const bot   = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.70 });
      // BoxGeometry face order: +x, -x, +y, -y, +z (spine/front), -z (back)
      mat = [cover, cover, top, bot, spine, cover];
    } else {
      mat = new THREE.MeshStandardMaterial({
        color: def.color, roughness: 0.70, metalness: 0.04
      });
    }

    const mesh = new THREE.Mesh(new THREE.BoxGeometry(def.w, def.h, DEPTH), mat);
    mesh.position.set(cx, shelfY + def.h / 2 + 0.10, 0);
    // slight random lean
    mesh.rotation.z = (Math.random() - 0.5) * 0.025;
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    mesh.userData = {
      baseZ:  mesh.position.z,
      targetZ: mesh.position.z,
      real:   !!def.real,
      label:  def.real ? def.label : null,
      url:    def.url || null,
    };

    scene.add(mesh);
    meshes.push(mesh);

    // Spot above main book
    if (def.real) {
      const spot = new THREE.PointLight(0xffffff, 0.55, 2.4);
      spot.position.set(cx, shelfY + def.h + 0.35, 0.55);
      scene.add(spot);
    }
  });

  return meshes;
}

const bookMeshes = [
  ...buildRow(ROW0, 0.08),
  ...buildRow(ROW1, 1.22),
];

// ── Dust particles ────────────────────────────────────
const dustPos  = new Float32Array(90 * 3);
const dustVel  = new Float32Array(90);
for (let i = 0; i < 90; i++) {
  dustPos[i*3]   = (Math.random() - 0.5) * 5.0;
  dustPos[i*3+1] = Math.random() * 2.8;
  dustPos[i*3+2] = (Math.random() - 0.5) * 1.5;
  dustVel[i]     = 0.0003 + Math.random() * 0.0005;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.007, transparent: true, opacity: 0.22, depthWrite: false
});
scene.add(new THREE.Points(dustGeo, dustMat));

// ── Mouse state ───────────────────────────────────────
let mouseNDC = new THREE.Vector2(0, 0); // -1..1 normalized
let mousePX  = { x: 0, y: 0 };

window.addEventListener('mousemove', e => {
  mouseNDC.x = (e.clientX / W()) * 2 - 1;
  mouseNDC.y = -((e.clientY / H()) * 2 - 1);
  mousePX = { x: e.clientX, y: e.clientY };
  doRaycast(e.clientX, e.clientY);
});

// ── Raycasting ────────────────────────────────────────
const raycaster = new THREE.Raycaster();
let hoveredMesh = null;

function doRaycast(cx, cy) {
  const rect = canvas.getBoundingClientRect();
  raycaster.setFromCamera(
    new THREE.Vector2(
      ((cx - rect.left) / rect.width)  * 2 - 1,
      -((cy - rect.top) / rect.height) * 2 + 1
    ),
    camera
  );
  const hits = raycaster.intersectObjects(bookMeshes);

  if (hits.length > 0) {
    const m = hits[0].object;
    if (hoveredMesh !== m) {
      if (hoveredMesh) hoveredMesh.userData.targetZ = hoveredMesh.userData.baseZ;
      hoveredMesh = m;
      hoveredMesh.userData.targetZ = hoveredMesh.userData.baseZ + 0.14;
    }
    canvas.style.cursor = 'pointer';
    // Tooltip
    if (m.userData.real) {
      ttTitle.textContent  = m.userData.label;
      ttAction.textContent = 'Click to open →';
    } else {
      ttTitle.textContent  = 'Coming soon';
      ttAction.textContent = 'More books on the way';
    }
    tooltip.style.display = 'flex';
  } else {
    if (hoveredMesh) {
      hoveredMesh.userData.targetZ = hoveredMesh.userData.baseZ;
      hoveredMesh = null;
    }
    canvas.style.cursor = 'default';
    tooltip.style.display = 'none';
  }
}

// ── Click ─────────────────────────────────────────────
canvas.addEventListener('click', e => {
  doRaycast(e.clientX, e.clientY);
  if (hoveredMesh && hoveredMesh.userData.real && hoveredMesh.userData.url) {
    window.location.href = hoveredMesh.userData.url;
  }
});

// ── Touch (mobile) ────────────────────────────────────
let lastTap = null;
canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  doRaycast(t.clientX, t.clientY);
  // Double-tap to navigate on mobile
  if (hoveredMesh && hoveredMesh.userData.real) {
    const now = Date.now();
    if (lastTap && now - lastTap < 500) {
      window.location.href = hoveredMesh.userData.url;
    }
    lastTap = now;
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseNDC.x = (t.clientX / W()) * 2 - 1;
  mouseNDC.y = -((t.clientY / H()) * 2 - 1);
  doRaycast(t.clientX, t.clientY);
}, { passive: true });

// ── Resize ────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

// ── Render loop ───────────────────────────────────────
let t = 0;
const camTarget = new THREE.Vector3();

(function loop() {
  requestAnimationFrame(loop);
  t += 0.008;

  // Smooth camera parallax (eye stays at z=2.9, head tilts)
  const targetX =  mouseNDC.x * 0.16;
  const targetY =  0.92 + mouseNDC.y * 0.07;
  camera.position.x += (targetX - camera.position.x) * 0.04;
  camera.position.y += (targetY - camera.position.y) * 0.04;
  camTarget.set(camera.position.x * 0.3, camera.position.y, 0);
  camera.lookAt(camTarget);

  // Book hover lerp (spring forward/back)
  bookMeshes.forEach(m => {
    m.position.z += (m.userData.targetZ - m.position.z) * 0.10;
  });

  // Dust drift upward, wrap around
  const pos = dustGeo.attributes.position;
  for (let i = 0; i < 90; i++) {
    pos.array[i*3+1] += dustVel[i];
    if (pos.array[i*3+1] > 2.9) pos.array[i*3+1] = 0;
  }
  pos.needsUpdate = true;

  renderer.render(scene, camera);
})();
</script>
</body>
</html>
